name: Watch Gashapon Page

on:
  workflow_dispatch:
    inputs:
      wait_first:
        description: "Wait 10 minutes before checking"
        type: boolean
        default: false
      continuous:
        description: "Queue the next check after this run"
        type: boolean
        default: true

permissions:
  actions: write
  contents: read

concurrency:
  group: gashapon-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TARGET_URL: https://gashapon.jp/shop/gplus_list.php?product_code=4582769911538
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_SERVER: https://ntfy.sh

    steps:
      - name: Wait between checks
        if: inputs.wait_first == true
        run: sleep 600

      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore snapshot
        uses: actions/cache/restore@v4
        with:
          path: state
          key: gashapon-watch-snapshot
          restore-keys: gashapon-watch-snapshot

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        id: watcher
        run: npm run check

      - name: Save snapshot
        if: success() && hashFiles('state/snapshot.json') != ''
        uses: actions/cache/save@v4
        with:
          path: state
          key: gashapon-watch-snapshot

      - name: Queue next check
        if: success() && inputs.continuous == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run watch.yml --repo "${{ github.repository }}" --ref main -f wait_first=true -f continuous=true
