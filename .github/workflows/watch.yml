name: Watch Gashapon Page

on:
  workflow_dispatch:
  schedule:
    # GitHub ActionsのcronはUTC基準。
    # これは日本時間でも毎時11分/41分に実行。
    - cron: "11,41 * * * *"

permissions:
  contents: write

concurrency:
  group: gashapon-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TARGET_URL: https://gashapon.jp/shop/gplus_list.php?product_code=4582769911538
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_SERVER: https://ntfy.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        run: npm run check

      - name: Commit snapshot if changed
        run: |
          if [[ -n "$(git status --porcelain state/snapshot.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/snapshot.json
            git commit -m "Update gashapon snapshot"
            git push
          else
            echo "No snapshot changes."
          fi
