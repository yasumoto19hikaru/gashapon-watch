name: Watch Gashapon Page

on:
  workflow_dispatch:
  schedule:
    # GitHub ActionsのcronはUTC基準。
    # これは日本時間でも毎時11分/41分に実行。
    - cron: "3,13,23,33,43,53 * * * *"

concurrency:
  group: gashapon-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TARGET_URL: https://gashapon.jp/shop/gplus_list.php?product_code=4582769911538
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_SERVER: https://ntfy.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore snapshot
        uses: actions/cache/restore@v4
        with:
          path: state
          key: gashapon-watch-snapshot
          restore-keys: gashapon-watch-snapshot

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        id: watcher
        run: npm run check

      - name: Save snapshot
        if: success() && hashFiles('state/snapshot.json') != ''
        uses: actions/cache/save@v4
        with:
          path: state
          key: gashapon-watch-snapshot
